<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админ панель</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: sans-serif;
            background: #f0f2f5;
            display: flex;
            height: 100vh;
        }

        /* Боковое меню */
        .sidebar {
            width: 220px;
            background: #1a1a2e;
            color: white;
            display: flex;
            flex-direction: column;
            padding: 30px 0;
            flex-shrink: 0;
        }

        .sidebar h2 {
            text-align: center;
            font-size: 18px;
            margin-bottom: 30px;
            color: #a5b4fc;
        }

        .sidebar a {
            display: block;
            padding: 12px 24px;
            color: #cbd5e1;
            text-decoration: none;
            font-size: 14px;
            transition: background 0.2s;
        }

        .sidebar a:hover { background: #2d2d5e; color: white; }
        .sidebar a.active { background: #4f46e5; color: white; }

        .sidebar .logout {
            margin-top: auto;
            padding: 12px 24px;
            color: #fc8181;
            cursor: pointer;
            font-size: 14px;
        }

        .sidebar .logout:hover { background: #2d2d5e; }

        /* Основной контент */
        .content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header h1 { font-size: 24px; color: #1a1a2e; }
        .header span { color: #666; font-size: 14px; }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .card .label { font-size: 13px; color: #888; margin-bottom: 8px; }
        .card .value { font-size: 28px; font-weight: bold; color: #1a1a2e; }

        .section {
            background: white;
            border-radius: 12px;
            padding: 28px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .section h2 { font-size: 17px; color: #1a1a2e; margin-bottom: 16px; }
        .section p { color: #888; font-size: 14px; }
    </style>
</head>
<body>

<!-- Боковое меню -->
<div class="sidebar">
    <h2>🎬 Кинотеатр</h2>
    <a href="#" class="active">Главная</a>
    <a href="#">Фильмы</a>
    <a href="#">Сеансы</a>
    <a href="#">Залы</a>
    <a href="#">Бронирования</a>
    <div class="logout" onclick="logout()">Выйти</div>
</div>

<!-- Основной контент -->
<div class="content">
    <div class="header">
        <h1>Добро пожаловать</h1>
        <span id="admin-email">загрузка...</span>
    </div>

    <div class="cards">
        <div class="card">
            <div class="label">Фильмов</div>
            <div class="value">—</div>
        </div>
        <div class="card">
            <div class="label">Сеансов</div>
            <div class="value">—</div>
        </div>
        <div class="card">
            <div class="label">Бронирований</div>
            <div class="value">—</div>
        </div>
        <div class="card">
            <div class="label">Залов</div>
            <div class="value">—</div>
        </div>
    </div>

    <div class="section">
        <h2>Панель управления</h2>
        <p>Здесь будет функционал для управления кинотеатром.</p>
    </div>
</div>

<script>
    // При открытии страницы — проверяем токен
    async function checkAuth() {
        const token = localStorage.getItem("admin_token");

        if (!token) {
            window.location.href = "/admin/login";
            return;
        }

        try {
            const response = await fetch("/admin/me", {
                headers: { "Authorization": "Bearer " + token }
            });

            if (!response.ok) {
                // Токен не валидный — на логин
                localStorage.removeItem("admin_token");
                window.location.href = "/admin/login";
                return;
            }

            const data = await response.json();
            document.getElementById("admin-email").textContent = data.message;

        } catch (e) {
            window.location.href = "/admin/login";
        }
    }

    function logout() {
        localStorage.removeItem("admin_token");
        window.location.href = "/admin/login";
    }

    checkAuth();
</script>

</body>
</html>
