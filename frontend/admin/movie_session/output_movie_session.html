<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Список Сеансов</title>
	<style>
		:root {
			--bg: #f3f6fb;
			--ink: #162033;
			--muted: #64748b;
			--panel: #ffffff;
			--line: #e2e8f0;
			--accent: #0f766e;
			--accent-hover: #115e59;
			--danger: #b91c1c;
		}

		* { box-sizing: border-box; }

		body {
			margin: 0;
			font-family: "Segoe UI", Tahoma, sans-serif;
			background: linear-gradient(140deg, #eff6ff 0%, #f8fafc 50%, #ecfeff 100%);
			color: var(--ink);
		}

		.wrap {
			max-width: 1120px;
			margin: 32px auto;
			padding: 0 16px;
		}

		.topbar {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 12px;
			margin-bottom: 18px;
		}

		h1 {
			margin: 0;
			font-size: clamp(24px, 4vw, 34px);
			letter-spacing: 0.01em;
		}

		.actions {
			display: flex;
			gap: 8px;
			flex-wrap: wrap;
		}

		.btn {
			border: 0;
			border-radius: 10px;
			padding: 10px 14px;
			cursor: pointer;
			text-decoration: none;
			font-weight: 600;
			font-size: 14px;
			display: inline-block;
		}

		.btn-primary {
			background: var(--accent);
			color: #fff;
		}

		.btn-primary:hover { background: var(--accent-hover); }

		.btn-ghost {
			background: #fff;
			color: #0f172a;
			border: 1px solid var(--line);
		}

		.actions-col {
			width: 132px;
			text-align: right;
		}

		.actions-wrap {
			display: inline-flex;
			align-items: center;
			justify-content: flex-end;
			gap: 8px;
		}

		.edit-btn {
			border: 1px solid #bfdbfe;
			background: #eff6ff;
			color: #1d4ed8;
			width: 36px;
			height: 36px;
			border-radius: 10px;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			cursor: pointer;
		}

		.edit-btn:hover {
			background: #dbeafe;
		}

		.edit-btn svg {
			width: 18px;
			height: 18px;
			fill: currentColor;
		}

		.delete-btn {
			border: 1px solid #fecaca;
			background: #fff5f5;
			color: var(--danger);
			width: 36px;
			height: 36px;
			border-radius: 10px;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			cursor: pointer;
		}

		.delete-btn:hover {
			background: #fee2e2;
		}

		.delete-btn svg {
			width: 18px;
			height: 18px;
			fill: currentColor;
		}

		.panel {
			background: var(--panel);
			border: 1px solid var(--line);
			border-radius: 16px;
			overflow: hidden;
			box-shadow: 0 14px 36px rgba(15, 23, 42, 0.08);
		}

		.panel-head {
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding: 14px 16px;
			border-bottom: 1px solid var(--line);
			background: #f8fafc;
		}

		.hint {
			margin: 0;
			color: var(--muted);
			font-size: 14px;
		}

		table {
			width: 100%;
			border-collapse: collapse;
		}

		th, td {
			text-align: left;
			padding: 12px 14px;
			border-bottom: 1px solid var(--line);
			font-size: 14px;
			vertical-align: top;
		}

		th {
			font-size: 12px;
			letter-spacing: 0.04em;
			text-transform: uppercase;
			color: var(--muted);
			background: #fcfdff;
		}

		.empty {
			padding: 28px 16px;
			color: var(--muted);
			text-align: center;
		}

		.status {
			margin-top: 14px;
			padding: 10px 12px;
			border-radius: 10px;
			font-size: 13px;
			display: none;
			white-space: pre-wrap;
		}

		.status.error {
			display: block;
			background: #fef2f2;
			border: 1px solid #fecaca;
			color: var(--danger);
		}

		@media (max-width: 860px) {
			.topbar {
				flex-direction: column;
				align-items: stretch;
			}

			.actions {
				width: 100%;
			}

			.btn {
				text-align: center;
				flex: 1;
			}
		}
	</style>
</head>
<body>
	<div class="wrap">
		<div class="topbar">
			<h1>Сеансы Кинотеатра</h1>
			<div class="actions">
				<a class="btn btn-ghost" href="/admin/dashboard">Назад в админку</a>
				<a class="btn btn-primary" href="/admin/sessions/create">Добавить сеанс</a>
			</div>
		</div>

		<section class="panel">
			<div class="panel-head">
				<p class="hint">Список запланированных сеансов</p>
				<button id="refresh-btn" class="btn btn-ghost" type="button">Обновить</button>
			</div>

			<div style="overflow:auto;">
				<table>
					<thead>
						<tr>
							<th>ID</th>
							<th>Фильм</th>
							<th>Зал</th>
							<th>Начало</th>
							<th>Базовая цена</th>
							<th class="actions-col">Действия</th>
						</tr>
					</thead>
					<tbody id="sessions-body"></tbody>
				</table>
			</div>

			<div id="empty" class="empty">Сеансов пока нет</div>
		</section>

		<div id="status" class="status"></div>
	</div>

	<script>
		const API = {
			me: "/admin/api/me",
			sessions: "/admin/api/sessions",
			deleteSession: (id) => `/admin/api/sessions/${id}`,
			login: "/admin/login",
		};

		const sessionsBody = document.getElementById("sessions-body");
		const empty = document.getElementById("empty");
		const statusBox = document.getElementById("status");
		const refreshBtn = document.getElementById("refresh-btn");

		function token() {
			return localStorage.getItem("admin_token");
		}

		function showError(text) {
			statusBox.className = "status error";
			statusBox.textContent = text;
		}

		function clearError() {
			statusBox.className = "status";
			statusBox.textContent = "";
		}

		function normalizeSessions(data) {
			if (Array.isArray(data)) return data;
			if (data && Array.isArray(data.sessions)) return data.sessions;
			return [];
		}

		function formatDateTime(value) {
			if (!value) return "-";
			const date = new Date(value);
			if (Number.isNaN(date.getTime())) return String(value);
			return date.toLocaleString("ru-RU");
		}

		function renderSessions(sessions) {
			sessionsBody.innerHTML = "";

			if (sessions.length === 0) {
				empty.style.display = "block";
				return;
			}

			empty.style.display = "none";

			for (const session of sessions) {
				const tr = document.createElement("tr");
				tr.innerHTML = `
					<td>${session.id ?? "-"}</td>
					<td>${session.movie_name ?? session.movie_id ?? "-"}</td>
					<td>${session.hall_name ?? session.hall_id ?? "-"}</td>
					<td>${formatDateTime(session.starts_at)}</td>
					<td>${session.base_price ?? "-"}</td>
					<td class="actions-col">
						<div class="actions-wrap">
							<button class="edit-btn" type="button" data-edit-session-id="${session.id}" aria-label="Редактировать сеанс">
								<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
									<path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zm2.92 2.33H5v-.92l9.06-9.06.92.92L5.92 19.58zM20.71 7.04a1 1 0 0 0 0-1.41L18.37 3.29a1 1 0 0 0-1.41 0l-1.13 1.13 3.75 3.75 1.13-1.13z"/>
								</svg>
							</button>
							<button class="delete-btn" type="button" data-delete-session-id="${session.id}" aria-label="Удалить сеанс">
								<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
									<path d="M9 3a1 1 0 0 0-1 1v1H5a1 1 0 1 0 0 2h1v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V7h1a1 1 0 1 0 0-2h-3V4a1 1 0 0 0-1-1H9zm1 2h4v1h-4V5zm-2 2h8v12H8V7zm2 2a1 1 0 0 0-1 1v6a1 1 0 1 0 2 0v-6a1 1 0 0 0-1-1zm4 0a1 1 0 0 0-1 1v6a1 1 0 1 0 2 0v-6a1 1 0 0 0-1-1z"/>
								</svg>
							</button>
						</div>
					</td>
				`;
				sessionsBody.appendChild(tr);
			}
		}

		async function onSessionActionClick(event) {
			const editButton = event.target.closest("[data-edit-session-id]");
			if (editButton) {
				const sessionId = Number(editButton.dataset.editSessionId);
				if (Number.isInteger(sessionId)) {
					window.location.href = `/admin/sessions/edit?id=${sessionId}`;
				}
				return;
			}

			const button = event.target.closest("[data-delete-session-id]");
			if (!button) return;

			const sessionId = Number(button.dataset.deleteSessionId);
			if (!Number.isInteger(sessionId)) {
				showError("Некорректный ID сеанса.");
				return;
			}

			const confirmed = window.confirm(`Удалить сеанс #${sessionId}?`);
			if (!confirmed) return;

			const t = token();
			if (!t) {
				window.location.href = API.login;
				return;
			}

			button.disabled = true;

			try {
				const response = await fetch(API.deleteSession(sessionId), {
					method: "DELETE",
					headers: { Authorization: `Bearer ${t}` },
				});

				if (!response.ok) {
					const text = await response.text();
					showError(`Ошибка удаления сеанса: ${response.status}\n${text}`);
					button.disabled = false;
					return;
				}

				await loadSessions();
			} catch {
				showError("Сервер недоступен.");
				button.disabled = false;
			}
		}

		async function ensureAdmin() {
			const t = token();
			if (!t) {
				window.location.href = API.login;
				return false;
			}

			try {
				const meResp = await fetch(API.me, {
					headers: { Authorization: `Bearer ${t}` },
				});

				if (!meResp.ok) {
					localStorage.removeItem("admin_token");
					window.location.href = API.login;
					return false;
				}
			} catch {
				showError("Не удалось проверить авторизацию.");
				return false;
			}

			return true;
		}

		async function loadSessions() {
			clearError();
			const t = token();
			if (!t) return;

			try {
				const response = await fetch(API.sessions, {
					method: "GET",
					headers: { Authorization: `Bearer ${t}` },
				});

				if (!response.ok) {
					if (response.status === 404 || response.status === 405) {
						showError("GET /admin/api/sessions пока не реализован на backend.");
						renderSessions([]);
						return;
					}

					const text = await response.text();
					showError(`Ошибка загрузки сеансов: ${response.status}\n${text}`);
					renderSessions([]);
					return;
				}

				const payload = await response.json();
				const sessions = normalizeSessions(payload);
				renderSessions(sessions);
			} catch {
				showError("Сервер недоступен.");
				renderSessions([]);
			}
		}

		refreshBtn.addEventListener("click", loadSessions);
		sessionsBody.addEventListener("click", onSessionActionClick);

		(async function init() {
			const ok = await ensureAdmin();
			if (!ok) return;
			await loadSessions();
		})();
	</script>
</body>
</html>
