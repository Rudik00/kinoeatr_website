<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фильм</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: sans-serif;
            background: #0f0f1a;
            color: #fff;
            min-height: 100vh;
        }

        /* Шапка */
        header {
            background: #1a1a2e;
            padding: 16px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #2d2d5e;
        }

        header .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        header .logo svg {
            height: 52px;
            width: auto;
            filter: drop-shadow(0 0 6px rgba(165,180,252,0.4));
        }

        header .logo span {
            font-size: 20px;
            font-weight: 700;
            color: #a5b4fc;
            letter-spacing: 1px;
        }

        header nav a {
            color: #cbd5e1;
            text-decoration: none;
            margin-left: 24px;
            font-size: 14px;
            transition: color 0.2s;
        }

        header nav a:hover { color: #a5b4fc; }

        /* Основной контент */
        main {
            padding: 40px;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Блок с информацией о фильме */
        .movie-info {
            display: flex;
            gap: 36px;
            margin-bottom: 48px;
        }

        .movie-poster {
            flex-shrink: 0;
            width: 220px;
            border-radius: 12px;
            overflow: hidden;
            background: #1a1a2e;
        }

        .movie-poster img {
            width: 100%;
            aspect-ratio: 2 / 3;
            object-fit: cover;
            display: block;
        }

        .movie-poster .no-photo {
            width: 100%;
            aspect-ratio: 2 / 3;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            font-size: 13px;
        }

        .movie-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding-top: 4px;
        }

        .movie-details h1 {
            font-size: 28px;
            color: #f1f5f9;
            line-height: 1.3;
        }

        .movie-meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .meta-item .label {
            font-size: 11px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .meta-item .value {
            font-size: 15px;
            color: #a5b4fc;
            font-weight: 600;
        }

        .movie-description {
            font-size: 15px;
            color: #94a3b8;
            line-height: 1.7;
            max-width: 640px;
        }

        /* Разделитель */
        .divider {
            border: none;
            border-top: 1px solid #2d2d5e;
            margin: 0 0 32px;
        }

        .sessions-title {
            font-size: 20px;
            color: #a5b4fc;
            font-weight: 600;
            margin-bottom: 24px;
        }

        /* Группа по дате */
        .date-group {
            margin-bottom: 32px;
        }

        .date-label {
            font-size: 13px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #2d2d5e;
        }

        .sessions-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        /* Карточка сеанса */
        .session-card {
            background: #1a1a2e;
            border: 1px solid #2d2d5e;
            border-radius: 10px;
            padding: 14px 20px;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
            min-width: 140px;
        }

        .session-card:hover {
            border-color: #a5b4fc;
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(165,180,252,0.2);
        }

        .session-time {
            font-size: 22px;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 4px;
        }

        .session-hall {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 6px;
        }

        .session-price {
            font-size: 14px;
            color: #a5b4fc;
            font-weight: 600;
        }

        /* Состояния */
        .state-msg {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
            font-size: 16px;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #2d2d5e;
            border-top-color: #a5b4fc;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 640px) {
            .movie-info { flex-direction: column; }
            .movie-poster { width: 100%; max-width: 280px; }
            main { padding: 20px; }
            header { padding: 12px 20px; }
        }
    </style>
</head>
<body>

<header>
    <a href="/movies" class="logo">
        <svg viewBox="0 0 100 120" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 10 Q10 10 10 20 L10 90 L50 120 L50 50 L90 10 Z" fill="#a5b4fc"/>
            <rect x="13" y="22" width="8" height="6" rx="1" fill="#0f0f1a"/>
            <rect x="13" y="35" width="8" height="6" rx="1" fill="#0f0f1a"/>
            <rect x="13" y="48" width="8" height="6" rx="1" fill="#0f0f1a"/>
            <rect x="13" y="61" width="8" height="6" rx="1" fill="#0f0f1a"/>
            <rect x="13" y="74" width="8" height="6" rx="1" fill="#0f0f1a"/>
            <rect x="28" y="13" width="8" height="6" rx="1" fill="#0f0f1a"/>
            <rect x="41" y="13" width="8" height="6" rx="1" fill="#0f0f1a"/>
            <rect x="54" y="13" width="8" height="6" rx="1" fill="#0f0f1a"/>
            <rect x="67" y="13" width="8" height="6" rx="1" fill="#0f0f1a"/>
            <rect x="80" y="13" width="8" height="6" rx="1" fill="#0f0f1a"/>
        </svg>
        <span>КиноЗал</span>
    </a>
    <nav>
        <a href="/movies">Все фильмы</a>
    </nav>
</header>

<main>
    <div id="content">
        <div class="state-msg">
            <div class="spinner"></div>
            Загружаем информацию...
        </div>
    </div>
</main>

<script>
    // Берём id из URL: /movie/5
    const movieId = window.location.pathname.split("/").filter(Boolean).pop();

    function formatDate(isoStr) {
        const d = new Date(isoStr);
        return d.toLocaleDateString("ru-RU", {
            day: "numeric", month: "long", year: "numeric", weekday: "long"
        });
    }

    function formatTime(isoStr) {
        const d = new Date(isoStr);
        return d.toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit" });
    }

    function dateKey(isoStr) {
        // "2026-05-10" — только дата для группировки
        return isoStr.slice(0, 10);
    }

    async function load() {
        const container = document.getElementById("content");

        try {
            const res = await fetch(`/api/movies/${movieId}`);
            if (!res.ok) throw new Error();
            const data = await res.json();

            if (data.error) {
                container.innerHTML = `<div class="state-msg">Фильм не найден</div>`;
                return;
            }

            document.title = data.name;

            // --- Постер ---
            const posterHtml = data.preview_foto
                ? `<img src="${data.preview_foto}" alt="${data.name}">`
                : `<div class="no-photo">Нет фото</div>`;

            // --- Мета ---
            const durationHtml = data.duration
                ? `<div class="meta-item">
                    <span class="label">Длительность</span>
                    <span class="value">${data.duration} мин</span>
                  </div>` : "";

            const releaseDateHtml = data.release_date
                ? `<div class="meta-item">
                    <span class="label">Дата выхода</span>
                    <span class="value">${data.release_date}</span>
                  </div>` : "";

            // --- Сеансы по датам ---
            let sessionsHtml = "";
            if (!data.sessions || data.sessions.length === 0) {
                sessionsHtml = `<p style="color:#64748b;font-size:15px;">Сеансов пока нет</p>`;
            } else {
                // Группируем по дате
                const groups = {};
                for (const s of data.sessions) {
                    const key = dateKey(s.starts_at);
                    if (!groups[key]) groups[key] = [];
                    groups[key].push(s);
                }

                for (const key of Object.keys(groups).sort()) {
                    const label = formatDate(groups[key][0].starts_at);
                    const cards = groups[key].map(s => `
                        <a class="session-card" href="/session/${s.id}">
                            <div class="session-time">${formatTime(s.starts_at)}</div>
                            <div class="session-hall">${s.hall_name || "Зал"}</div>
                            <div class="session-price">от ${s.base_price} ₽</div>
                        </a>
                    `).join("");

                    sessionsHtml += `
                        <div class="date-group">
                            <div class="date-label">${label}</div>
                            <div class="sessions-row">${cards}</div>
                        </div>
                    `;
                }
            }

            container.innerHTML = `
                <div class="movie-info">
                    <div class="movie-poster">${posterHtml}</div>
                    <div class="movie-details">
                        <h1>${data.name}</h1>
                        <div class="movie-meta">
                            ${durationHtml}
                            ${releaseDateHtml}
                        </div>
                        <p class="movie-description">${data.description || ""}</p>
                    </div>
                </div>

                <hr class="divider">

                <div class="sessions-title">Расписание сеансов</div>
                ${sessionsHtml}
            `;

        } catch (err) {
            container.innerHTML = `<div class="state-msg">Не удалось загрузить данные</div>`;
            console.error(err);
        }
    }

    load();
</script>

</body>
</html>
